# Monorepo: Next.js app lives in new-tem.
# Netlify's Next.js runtime handles publish output automatically.

[build]
  base = "new-tem"
  command = "npm run build"
  # Publish is relative to `base` (see Netlify monorepo docs). Use `.next`, not `new-tem/.next`
  # or Netlify falls back to publishing the whole base dir — same as base — and the Next.js plugin errors.
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
